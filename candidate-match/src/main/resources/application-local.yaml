server:
  forward-headers-strategy: framework

spring:
  servlet:
    multipart:
      enabled: true
      file-size-threshold: 128KB
      max-file-size: 10MB
      max-request-size: 10MB
      resolve-lazily: true
      location: /tmp/uploads
  datasource:
    url: jdbc:postgresql://localhost:5433/candidatematch?sslmode=disable
    username: candidatematch
    password: candidatematch123
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 10000
      idle-timeout: 300000
      max-lifetime: 1200000
      validation-timeout: 5000
      schema: public
  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.xml
    enabled: true
    contexts: "default,pgvector"
  task:
    execution:
      pool:
        core-size: 5
        max-size: 20
        queue-capacity: 100
        thread-name-prefix: ai-async-
    scheduling:
      pool:
        size: 5
  mvc:
    async:
      request-timeout: 300000 # 5 minutes
    servlet:
      path: /api
  ai:
    ollama:
      base-url: https://kb-ollama-cv-ca-dev.blackisland-4a1bc921.westeurope.azurecontainerapps.io
      chat:
        options:
          model: gemma3:4b
      embedding:
        options:
          model: gemma3:4b
    vectorstore:
      pgvector:
        initialize-schema: false
        table-name: vector_store

# Ollama configuration for OllamaHttpClient
ollama:
  baseUrl: https://kb-ollama-cv-ca-dev.blackisland-4a1bc921.westeurope.azurecontainerapps.io
  # Using available model from Azure Container Apps
  model: gemma3:4b
  embeddingModel: gemma3:4b                 # Using same model for embeddings
  embeddingFallbackModel: gemma3:4b         # fallback embedding
  connectTimeoutSeconds: 10                 # connection timeout
  readTimeoutSeconds: 300                   # read timeout (5 minutes - Gemma3 12B can be slow on complex CVs)
  writeTimeoutSeconds: 30                   # write timeout

# Embedding configuration for semantic search
embedding:
  enabled: true
  provider: OLLAMA
  model: gemma3:4b
  dimension: 1024

# AI Settings for provider selection and configuration
ai:
  provider: OLLAMA
  timeout: 180s
  models:
    interpretation: gemini-2.5-flash
    generation_default: gemini-2.5-flash
    generation_quality: gemini-2.5-pro
    embeddings: gemma3:4b
  timeouts:
    interpretation: 1500  # 1.5s for fast query classification
    generation: 3000     # 3s for answer generation
    retrieval: 150       # 150ms for vector retrieval
  rag:
    enabled: true
    chunk_size: 700
    chunk_overlap: 100
    top_k_chunks: 8
  semantic:
    enabled: true
  hybrid:
    enabled: true
    semantic_weight: 0.7
    quality_weight: 0.3
  streaming:
    enabled: false  # Enable later when UI supports it

search:
  lexicon:
    public-sector-tokens: ["kommune","etat","nav","skatt","stat","offentlig","departement","direktorat","helsedirektoratet","kartverket","politiet","helse","utdanningsdirektoratet"]
    customer-synonyms:
      sparebank1: ["sparebank 1","sb1"]
      dnb: ["den norske bank","d.n.b"]
      nav: ["arbeids- og velferdsetaten"]
  ollama:
    base-url: https://kb-ollama-cv-ca-dev.blackisland-4a1bc921.westeurope.azurecontainerapps.io
    model: gemma3:4b
    connect-timeout-seconds: 5
    read-timeout-seconds: 120
    write-timeout-seconds: 10

projectrequest:
  analysis:
    ai-enabled: true
    provider: OLLAMA

sync:
  consultants:
    on-startup: true

matching:
  provider: OLLAMA
  topN: 10
  enabled: true
  # Model is now configured in gemini.matchingModel above
  # This setting is kept for backwards compatibility but gemini.matchingModel takes precedence
  model: gemini-2.5-pro  # Stable workhorse for batch operations

management:
  endpoints:
    web:
      exposure:
        include: mappings,health
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  health:
    # Make health check less strict
    group:
      readiness:
        include: "readinessState,dependencies"

logging:
  level:
    no.cloudberries.candidatematch: INFO # Setter DEBUG-logging for din kode
