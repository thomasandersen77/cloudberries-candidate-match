server:
  forward-headers-strategy: framework

spring:
  servlet:
    multipart:
      enabled: true
      file-size-threshold: 128KB
      max-file-size: 10MB
      max-request-size: 10MB
      resolve-lazily: true
      location: /tmp/uploads
  datasource:
    url: jdbc:postgresql://cloudberries-candidate-match-pgdb.postgres.database.azure.com:5432/candidatematch?sslmode=require
    username: candidatematch
    password: OdU]22WkG6$7
    hikari:
      maximum-pool-size: 10
      minimum-idle: 3                       # Reduced for low-traffic production
      connection-timeout: 10000              # 10 seconds
      idle-timeout: 300000                   # 5 minutes
      max-lifetime: 1200000                  # 20 minutes - force connection refresh
      validation-timeout: 5000               # 5 seconds
      leak-detection-threshold: 60000        # IMPORTANT: Warn if connection held > 60s
      connection-test-query: SELECT 1        # Validate connections
      schema: public
  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.xml
    enabled: true
    contexts: "default,pgvector"
# application-prod.yml

# Make external services optional
flowcase:
  apiKey: ${FLOWCASE_API_KEY}
  baseUrl: ${FLOWCASE_BASE_URL}

openai:
  apiKey: ${OPENAI_API_KEY}
  model: gpt-5
  assistantId: ${OPENAI_ASSISTANT_ID}

gemini:
  apiKey: ${GEMINI_API_KEY}
  model: gemini-2.5-pro

anthropic:
  apiKey: ${ANTHROPIC_API_KEY}
  model: ${ANTHROPIC_MODEL:claude-3-5-sonnet-20241022}
  baseUrl: ${ANTHROPIC_BASE_URL:https://api.anthropic.com}

embedding:
  enabled: true
  provider: OLLAMA  # Local bge-m3 model for embeddings
  model: bge-m3
  dimension: 1024

ai:
  ollama:
    base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
    model: gemma3:12b-cv-expert-v3
  provider: OLLAMA
  models:
    interpretation: gemma3:12b-cv-expert-v3
    generation_default: gemma3:12b-cv-expert-v3
    generation_quality: gemma3:12b-cv-expert-v3
    embeddings: bge-m3
  timeouts:
    interpretation: 1500  # 1.5s for fast query classification
    generation: 3000     # 3s for answer generation
    retrieval: 150       # 150ms for vector retrieval
  rag:
    enabled: true
    chunk_size: 700
    chunk_overlap: 100
    top_k_chunks: 8
  semantic:
    enabled: true
  hybrid:
    enabled: true
    semantic_weight: 0.7
    quality_weight: 0.3
  streaming:
    enabled: false  # Enable later when UI supports it

search:
  lexicon:
    public-sector-tokens: ["kommune","etat","nav","skatt","stat","offentlig","departement","direktorat","helsedirektoratet","kartverket","politiet","helse","utdanningsdirektoratet"]
    customer-synonyms:
      sparebank1: ["sparebank 1","sb1"]
      dnb: ["den norske bank","d.n.b"]
      nav: ["arbeids- og velferdsetaten"]
  ollama:
    base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
    model: gemma3:12b-cv-expert-v3
    connect-timeout-seconds: 5
    read-timeout-seconds: 120
    write-timeout-seconds: 10
projectrequest:
  analysis:
    ai-enabled: true
    provider: OLLAMA
sync:
  consultants:
    on-startup: true

management:
  endpoints:
    web:
      exposure:
        include: mappings,health
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  health:
    # Make health check less strict
    group:
      readiness:
        include: "readinessState,dependencies"

logging:
  level:
    no.cloudberries.candidatematch: INFO # Setter DEBUG-logging for din kode
